name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: macos-14
    outputs:
      sha256: ${{ steps.sha.outputs.sha256 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Build App for Release
        run: |
          xcodebuild -project uttr.xcodeproj \
            -scheme uttr \
            -configuration Release \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create ZIP
        run: |
          cd $RUNNER_TEMP/DerivedData/Build/Products/Release
          zip -r $RUNNER_TEMP/uttr.zip uttr.app

      - name: Get SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 $RUNNER_TEMP/uttr.zip | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ runner.temp }}/uttr.zip
          body: |
            ## Installation

            ### Homebrew (Recommended)
            ```bash
            brew tap ShishirAravindan/tap
            brew install --cask uttr
            ```

            ### Manual Download
            1. Download `uttr.zip` below
            2. Unzip and move to Applications
            3. On first launch: System Settings → Privacy & Security → Open Anyway

            ## SHA256
            ```
            ${{ steps.sha.outputs.sha256 }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    name: Update Homebrew Tap
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: ShishirAravindan/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Bump version and sha256 in cask
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="${{ needs.build-and-release.outputs.sha256 }}"
          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/uttr.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA\"/" Casks/uttr.rb

      - name: Open PR in tap repo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          commit-message: "chore: bump uttr to ${{ github.ref_name }}"
          title: "chore: bump uttr to ${{ github.ref_name }}"
          body: "Automated cask update for release [${{ github.ref_name }}](https://github.com/ShishirAravindan/uttr/releases/tag/${{ github.ref_name }})."
          branch: "bump/uttr-${{ github.ref_name }}"
