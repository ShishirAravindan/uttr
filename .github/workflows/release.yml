name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Build App for Release
        run: |
          xcodebuild -project uttr.xcodeproj \
            -scheme uttr \
            -configuration Release \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create ZIP
        run: |
          cd $RUNNER_TEMP/DerivedData/Build/Products/Release
          zip -r $RUNNER_TEMP/uttr.zip uttr.app

      - name: Get SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 $RUNNER_TEMP/uttr.zip | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ runner.temp }}/uttr.zip
          body: |
            ## Installation

            ### Homebrew (Recommended)
            ```bash
            brew install --cask uttr
            ```

            ### Manual Download
            1. Download `uttr.zip` below
            2. Unzip and move to Applications
            3. On first launch: System Settings → Privacy & Security → Open Anyway

            ## SHA256
            ```
            ${{ steps.sha.outputs.sha256 }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
