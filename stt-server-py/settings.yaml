# uttr Application Configuration

# Model Selection
stt:
  provider: "whisper"

# Server Settings
server:
  host: "localhost"
  port: 3001
  uv_path: "/opt/homebrew/bin/uv"
  script_path: "transcription_server.py"

# Audio Settings
audio:
  sample_rate: 16000
  channels: 1
  format: wav
  chunk_duration: 3  # seconds

# Whisper Settings
whisper:
  model: "small"  # Change from "base" to "large"
  language: "en"
  task: "transcribe"
  temperature: 0.0

# Parakeet Settings (MLX-optimized for Apple Silicon)
parakeet:
  model: "mlx-community/parakeet-tdt-0.6b-v3"

# LLM Settings (used by /transform endpoint, not during transcription)
llm:
  base_url: "http://localhost:11434"
  enabled: true
  model: "llama3.2-3b"
  temperature: 0.1
  max_tokens: 500

# Hotkey Settings
hotkey:
  key_code: 37  # L key
  modifiers: ["option"]

# Transform Settings
# Prompts are defined as built-in defaults in transcription_server.py
# TODO-Shishir-P3: Add UI for editing transform modes and custom prompts
transform:
  default_mode: "bullets"
  hotkey:
    key_code: 1  # S key
    modifiers: ["option"]

# Logging Settings
logging:
  enabled: true
  log_file: "transcriptions.log"
  max_file_size: "10MB"
  backup_count: 5 